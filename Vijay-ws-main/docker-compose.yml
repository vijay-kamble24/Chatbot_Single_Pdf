services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pdf_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  sql-server:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: pdf_sql_server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SqlChatbotSecurePass!2026
      - MSSQL_PID=Developer
    volumes:
      - sql_server_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  qdrant_data:
  sql_server_data:
